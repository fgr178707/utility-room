    <body>

</style>

<a name="top"></a>
<div class="container_24">
    <div class="filter">
        <input id="filter" placeholder="输入关键字筛选"/>
        <input type="button" id="do-search" value="搜索"/>
    </div>

    <table class="table" style="font-size: 10pt">
        <tbody>
        <tr onclick="window.open('转链接')" class='dl-link'><td class="model"><a onclick="goto_cat_link(event)" class="cat_link"> [分类]</a>名称</td></tr>



        <script>
            $(document).ready(function () {
               window.goto_cat_link = function (event) {
                   event.stopPropagation();
                   location.href=$(event.target).attr('href');
                   return false;
               }

               $('#do-search').on('click',function () {
                   var keyword = $('#filter').val();
                   if (keyword && keyword.length > 0){
                       do_filter(keyword);
                   }else{
                       $('.model').show();
                   }
               });

               function do_filter(keyword){
                   $('.model').each(function () {
                       var html = $(this).html();
                       var text = html.replace(/<\/?.+?\/?>/g,'');
                       if (text.indexOf(keyword) >= 0){
                           $(this).show();
                       }else{
                           $(this).hide();
                       }
                   });
               }

            });
        </script>
        </tbody>
    </table>


<style>
    body {
        transition: background-color 0.3s, color 0.3s;
    }
    .dark-mode {
        background-color: #121212;
        color: #ffffff;
    }
    .dark-mode .table>tbody>tr>td, .dark-mode .table>tbody>tr>th, 
    .dark-mode .table>tfoot>tr>td, .dark-mode .table>tfoot>tr>th, 
    .dark-mode .table>thead>tr>td, .dark-mode .table>thead>tr>th {
        border-top: 1px solid #ffffff;
    }
    .toggle-dark-mode {
        position: fixed;
        bottom: 10px;
        right: 10px;
        background-color: #ffffff;
        color: #000000;
        border: none;
        padding: 10px;
        cursor: pointer;
        font-size: 14px;
    }
    .dark-mode .toggle-dark-mode {
        background-color: #333333;
        color: #ffffff;
    }
</style>

<button class="toggle-dark-mode">切换黑暗模式</button>
<script>
    $(document).ready(function () {
        $('.toggle-dark-mode').on('click', function () {
            $('body').toggleClass('dark-mode');
        });
    });
</script>
</body>
